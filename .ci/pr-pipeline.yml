pr:
  branches:
    include: ["*"]

trigger:
  - none

variables:
  NpmRegistry: $(NPM_REGISTRY_URL)

jobs:
  - job: Linux
    pool:
      vmImage: ubuntu-latest
    timeoutInMinutes: 10
    steps:
      - checkout: self
        clean: true
      - template: common-validation.yml
        parameters:
          npmRegistry: $(NpmRegistry)
          enforceNetworkIsolation: true

  - job: Windows
    pool:
      vmImage: windows-latest
    timeoutInMinutes: 10
    steps:
      - checkout: self
        clean: true
      - template: common-validation.yml
        parameters:
          npmRegistry: $(NpmRegistry)
          enforceNetworkIsolation: true

  - job: macOS
    pool:
      vmImage: macOS-latest
    timeoutInMinutes: 10
    steps:
      - checkout: self
        clean: true
      - template: common-validation.yml
        parameters:
          npmRegistry: $(NpmRegistry)
          enforceNetworkIsolation: true
